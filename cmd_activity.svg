<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 40" width="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .prompt {
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        fill: #00F2FE;
        font-weight: 700;
      }
      .cmd {
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        fill: #FFFFFF;
      }
      .cursor {
        fill: #00FF87;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        50% { opacity: 0; }
      }
    </style>
    <clipPath id="clip-activity">
      <rect x="245" y="5" width="0" height="30">
        <animate attributeName="width" from="0" to="173" dur="1s" begin="0.2s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>
  <rect width="100%" height="100%" fill="#0B0F19" rx="4" />
  <rect width="100%" height="100%" fill="none" stroke="#1E293B" stroke-width="1" rx="4" />
  <text x="40" y="26">
    <tspan class="prompt">naman@portfolio:~$ </tspan>
    <tspan class="cmd" clip-path="url(#clip-activity)">cat activity.log</tspan>
  </text>
  <rect x="245" y="10" width="8" height="20" class="cursor">
    <animate attributeName="x" from="245" to="418" dur="1s" begin="0.2s" fill="freeze" />
  </rect>
</svg>
