<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 32" width="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .prompt {
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        fill: #00F2FE;
        font-weight: 700;
      }
      .cmd {
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        fill: #FFFFFF;
      }
      .cursor {
        fill: #00FF87;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        50% { opacity: 0; }
      }
    </style>
    <clipPath id="clip">
      <rect x="245" y="0" width="0" height="32">
        <animate attributeName="width" from="0" to="260" dur="1s" begin="0.2s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>
  <text x="40" y="22">
    <tspan class="prompt">naman@portfolio:~$ </tspan>
    <tspan class="cmd" clip-path="url(#clip)">show projects --featured</tspan>
  </text>
  <rect x="245" y="6" width="8" height="20" class="cursor">
    <animate attributeName="x" from="245" to="505" dur="1s" begin="0.2s" fill="freeze" />
  </rect>
</svg>
