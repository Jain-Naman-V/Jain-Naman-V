<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 670" width="100%" height="670">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');

      .window-bg {
        fill: url(#bgGrad);
        stroke: url(#borderGrad);
        stroke-width: 1.5;
      }
      .title-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        fill: #64748B;
      }
      .ascii-art {
        font-family: 'JetBrains Mono', monospace;
        font-size: 5.6px;
        fill: url(#asciiGrad);
        font-weight: 700;
      }
      .prompt-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 15px;
        fill: #00F2FE;
        font-weight: 700;
      }
      .command-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 15px;
        fill: #FFFFFF;
        font-weight: 400;
      }
      .bio-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 14.5px;
        fill: #E2E8F0;
        line-height: 1.6;
      }
    </style>

    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.3" />
    </linearGradient>
    <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="50%" stop-color="#4FACFE" />
      <stop offset="100%" stop-color="#00FF87" />
    </linearGradient>
  </defs>

  <!-- Card Window Background -->
  <rect width="1000" height="670" rx="12" class="window-bg" />

  <!-- macOS Style Title Bar -->
  <line x1="0" y1="40" x2="1000" y2="40" stroke="#1E293B" stroke-width="1.5" />
  <circle cx="25" cy="20" r="6" fill="#FF5F56" />
  <circle cx="45" cy="20" r="6" fill="#FFBD2E" />
  <circle cx="65" cy="20" r="6" fill="#27C93F" />
  <text x="500" y="25" text-anchor="middle" class="title-text">naman@portfolio: ~</text>

  <!-- Terminal Session Output -->
  
  <!-- Bio Section (Command Output) -->
  <text x="45" y="80">
    <tspan class="prompt-text">naman@portfolio:~$ </tspan>
    <tspan class="command-text">cat intro.txt</tspan>
  </text>
  
  <text x="45" y="110" class="bio-text">
    <tspan x="45" dy="0">An Oracle Certified AI Engineer, Anthropic MCP Certified developer, and former 2× founder.</tspan>
    <tspan x="45" dy="24">Currently working as an AI Engineer at Scanbo, I specialize in building scalable AI systems</tspan>
    <tspan x="45" dy="24">using LangChain, LangGraph, and Agentic RAG. Driven by a founder's mindset, I bridge</tspan>
    <tspan x="45" dy="24">customer problems with production-ready AI agents and enterprise workflow automations.</tspan>
  </text>

  <!-- Portrait Section (Command Output) -->
  <text x="45" y="225">
    <tspan class="prompt-text">naman@portfolio:~$ </tspan>
    <tspan class="command-text">view portrait.sh</tspan>
  </text>

