  <!-- Right Side Content -->
  
  <!-- Title / Greeting -->
  <text x="530" y="100" class="name-text">Hi 👋 I'm Naman Jain</text>

  <!-- Prompt and Animated Roles Typewriter -->
  <text x="530" y="165" class="prompt-text">naman@portfolio:~$ </text>
  
  <!-- Typing text overlays -->
  <text class="role-text" clip-path="url(#clip1)" x="705" y="165">
    AI Engineer
    <animate attributeName="opacity" 
             values="1;1;1;1;1;0;0" 
             keyTimes="0;0.02;0.10;0.25;0.33;0.331;1" 
             dur="12s" repeatCount="indefinite" />
  </text>
  <text class="role-text" clip-path="url(#clip2)" x="705" y="165">
    Full Stack Developer
    <animate attributeName="opacity" 
             values="0;0;1;1;1;1;0;0" 
             keyTimes="0;0.349;0.35;0.43;0.58;0.66;0.661;1" 
             dur="12s" repeatCount="indefinite" />
  </text>
  <text class="role-text" clip-path="url(#clip3)" x="705" y="165">
    Product Builder
    <animate attributeName="opacity" 
             values="0;0;0;1;1;1;1;0" 
             keyTimes="0;0.679;0.68;0.76;0.91;0.99;0.991;1" 
             dur="12s" repeatCount="indefinite" />
  </text>

  <!-- Cursors for Typewriter roles -->
  <!-- Cursor 1 -->
  <rect y="148" width="8" height="22" fill="#00FF87">
    <animate attributeName="x" 
             values="705;705;842;842;705;705;705" 
             keyTimes="0;0.02;0.10;0.25;0.33;0.331;1" 
             dur="12s" repeatCount="indefinite" />
    <animate attributeName="opacity" 
             values="1;1;1;1;1;0;0" 
             keyTimes="0;0.02;0.10;0.25;0.33;0.331;1" 
             dur="12s" repeatCount="indefinite" />
    <animate attributeName="visibility"
             values="visible;hidden;visible"
             dur="0.8s" repeatCount="indefinite" />
  </rect>

  <!-- Cursor 2 -->
  <rect y="148" width="8" height="22" fill="#00FF87">
    <animate attributeName="x" 
