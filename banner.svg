    </text>
  </g>

  <!-- ═══════ Three Action Buttons ═══════ -->
  <g class="a-buttons">
    <!-- Button 1: Open Naman Bot -->
    <rect x="70" y="700" width="260" height="38" rx="8" class="btn-bg" stroke="url(#cyanBorder)" />
    <text x="200" y="724" class="btn-text" fill="#00F2FE">💬  Open Naman Bot</text>

    <!-- Button 2: Visit Portfolio -->
    <rect x="370" y="700" width="260" height="38" rx="8" class="btn-bg" stroke="url(#purpleBorder)" />
    <text x="500" y="724" class="btn-text" fill="#BF5AF2">🌐  Visit Portfolio</text>

    <!-- Button 3: Download Resume -->
    <rect x="670" y="700" width="260" height="38" rx="8" class="btn-bg" stroke="url(#greenBorder)" />
    <text x="800" y="724" class="btn-text" fill="#00FF87">📄  Download Resume</text>
  </g>
</svg>
