<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 730" width="100%" height="730">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');

      /* ── Keyframes ── */
      @keyframes typeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      /* ── Base Styles ── */
      .ascii-art {
        font-family: 'JetBrains Mono', monospace;
        font-size: 7.0px;
        fill: #0F172A;
        font-weight: 700;
      }
      .prompt {
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        fill: #00F2FE;
        font-weight: 700;
      }
      .cmd {
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        fill: #FFFFFF;
      }
      .bio {
        font-family: 'JetBrains Mono', monospace;
        font-size: 16px;
        fill: #94A3B8;
      }

      /* ── Staggered Animations ── */
      .a-prompt1  { opacity: 0; animation: typeIn 0.1s ease forwards 0.1s; }
      .a-prompt2  { opacity: 0; animation: typeIn 0.1s ease forwards 6.2s; }
      .a-portrait { opacity: 0; animation: typeIn 0.8s ease forwards 7.4s; }

      /* ── Cursor ── */
      .cursor {
        fill: #00FF87;
        animation: blink 1s step-end infinite;
      }
    </style>

    <!-- Clip Paths for Typewriter Reveals -->
    <clipPath id="clip-cmd1">
      <rect x="245" y="15" width="0" height="30">
        <animate attributeName="width" from="0" to="140" dur="0.8s" begin="0.3s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="clip-bio1">
      <rect x="40" y="55" width="0" height="25">
        <animate attributeName="width" from="0" to="920" dur="1.2s" begin="1.5s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="clip-bio2">
      <rect x="40" y="82" width="0" height="25">
        <animate attributeName="width" from="0" to="920" dur="1.2s" begin="2.6s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="clip-bio3">
      <rect x="40" y="109" width="0" height="25">
        <animate attributeName="width" from="0" to="920" dur="1.2s" begin="3.7s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="clip-bio4">
      <rect x="40" y="136" width="0" height="25">
        <animate attributeName="width" from="0" to="920" dur="1.2s" begin="4.8s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="clip-cmd2">
      <rect x="245" y="180" width="0" height="30">
        <animate attributeName="width" from="0" to="195" dur="0.8s" begin="6.3s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

  <!-- ═══════ Command 1: cat intro.txt ═══════ -->
  <g class="a-prompt1">
    <text x="40" y="40">
      <tspan class="prompt">naman@portfolio:~$ </tspan>
      <tspan class="cmd" clip-path="url(#clip-cmd1)">cat intro.txt</tspan>
    </text>
    <rect x="245" y="24" width="8" height="20" class="cursor">
      <animate attributeName="x" from="245" to="385" dur="0.8s" begin="0.3s" fill="freeze" />
      <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.9;1" dur="0.9s" begin="0.3s" fill="freeze" />
    </rect>
  </g>

  <!-- Bio Output (character-by-character typing) -->
  <text x="40" y="75" class="bio" clip-path="url(#clip-bio1)">An Oracle Certified AI Engineer, Anthropic MCP Certified developer, and former 2× founder.</text>
  <text x="40" y="102" class="bio" clip-path="url(#clip-bio2)">Currently working as an AI Engineer at Scanbo, I specialize in building scalable AI systems</text>
  <text x="40" y="129" class="bio" clip-path="url(#clip-bio3)">using LangChain, LangGraph, and Agentic RAG. Driven by a founder's mindset, I bridge</text>
  <text x="40" y="156" class="bio" clip-path="url(#clip-bio4)">customer problems with production-ready AI agents and enterprise workflow automations.</text>

  <!-- ═══════ Command 2: view portrait.sh ═══════ -->
  <g class="a-prompt2">
    <text x="40" y="205">
      <tspan class="prompt">naman@portfolio:~$ </tspan>
      <tspan class="cmd" clip-path="url(#clip-cmd2)">./view portrait.sh</tspan>
    </text>
    <rect x="245" y="189" width="8" height="20" class="cursor">
      <animate attributeName="x" from="245" to="440" dur="0.8s" begin="6.3s" fill="freeze" />
      <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.9;1" dur="0.9s" begin="6.3s" fill="freeze" />
    </rect>
  </g>

  <!-- ═══════ ASCII Art Portrait (White Background Card) ═══════ -->
