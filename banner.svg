<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" width="100%" height="750">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');

      /* ── Keyframes ── */
      @keyframes typeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes glowPulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }

      /* ── Base Styles ── */
      .window-bg {
        fill: url(#bgGrad);
        stroke: url(#borderGrad);
        stroke-width: 1.5;
      }
      .title-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        fill: #64748B;
      }
      .ascii-art {
        font-family: 'JetBrains Mono', monospace;
        font-size: 5.8px;
        fill: url(#asciiGrad);
        font-weight: 700;
      }
      .prompt {
        font-family: 'JetBrains Mono', monospace;
        font-size: 15px;
        fill: #00F2FE;
        font-weight: 700;
      }
      .cmd {
        font-family: 'JetBrains Mono', monospace;
        font-size: 15px;
        fill: #FFFFFF;
      }
      .bio {
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        fill: #94A3B8;
      }
      .btn-bg {
        fill: #1E293B;
        stroke-width: 1.5;
        rx: 8;
      }
      .btn-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }

      /* ── Staggered Animations ── */
      .a-prompt1  { opacity: 0; animation: typeIn 0.1s ease forwards 0.3s; }
      .a-bio1     { opacity: 0; animation: typeIn 0.4s ease forwards 0.8s; }
      .a-bio2     { opacity: 0; animation: typeIn 0.4s ease forwards 1.5s; }
      .a-bio3     { opacity: 0; animation: typeIn 0.4s ease forwards 2.2s; }
      .a-bio4     { opacity: 0; animation: typeIn 0.4s ease forwards 2.9s; }
      .a-prompt2  { opacity: 0; animation: typeIn 0.3s ease forwards 3.8s; }
      .a-portrait { opacity: 0; animation: typeIn 0.8s ease forwards 4.3s; }
      .a-buttons  { opacity: 0; animation: typeIn 0.5s ease forwards 5.2s; }

      /* ── Cursor ── */
      .cursor {
        fill: #00FF87;
        animation: blink 1s step-end infinite;
      }
    </style>

    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.4" />
    </linearGradient>
    <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="50%" stop-color="#4FACFE" />
      <stop offset="100%" stop-color="#00FF87" />
    </linearGradient>
    <linearGradient id="cyanBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    <linearGradient id="purpleBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#D946EF" />
    </linearGradient>
    <linearGradient id="greenBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF87" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>
  </defs>

  <!-- ═══════ Window Background ═══════ -->
  <rect width="1000" height="750" rx="12" class="window-bg" />

  <!-- ═══════ macOS Title Bar ═══════ -->
  <line x1="0" y1="40" x2="1000" y2="40" stroke="#1E293B" stroke-width="1.5" />
  <circle cx="25" cy="20" r="6" fill="#FF5F56" />
  <circle cx="45" cy="20" r="6" fill="#FFBD2E" />
  <circle cx="65" cy="20" r="6" fill="#27C93F" />
  <text x="500" y="25" text-anchor="middle" class="title-text">naman@portfolio: ~</text>

  <!-- ═══════ Command 1: cat intro.txt ═══════ -->
  <g class="a-prompt1">
    <text x="40" y="75">
      <tspan class="prompt">naman@portfolio:~$ </tspan>
      <tspan class="cmd">cat intro.txt</tspan>
    </text>
    <!-- Blinking cursor after command -->
    <rect x="275" y="62" width="8" height="17" class="cursor" />
  </g>

  <!-- Bio Output (line-by-line typing) -->
  <text x="40" y="105" class="bio a-bio1">
    An Oracle Certified AI Engineer, Anthropic MCP Certified developer, and former 2× founder.
  </text>
  <text x="40" y="127" class="bio a-bio2">
    Currently working as an AI Engineer at Scanbo, I specialize in building scalable AI systems
  </text>
  <text x="40" y="149" class="bio a-bio3">
    using LangChain, LangGraph, and Agentic RAG. Driven by a founder's mindset, I bridge
  </text>
  <text x="40" y="171" class="bio a-bio4">
    customer problems with production-ready AI agents and enterprise workflow automations.
  </text>

  <!-- ═══════ Command 2: view portrait.sh ═══════ -->
  <g class="a-prompt2">
    <text x="40" y="210">
      <tspan class="prompt">naman@portfolio:~$ </tspan>
      <tspan class="cmd">./view portrait.sh</tspan>
    </text>
    <rect x="310" y="197" width="8" height="17" class="cursor" />
  </g>

  <!-- ═══════ ASCII Art Portrait (Full Width Centered) ═══════ -->
