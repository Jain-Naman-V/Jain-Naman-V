<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="100%" height="620">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');

      /* ── Keyframes ── */
      @keyframes typeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      /* ── Base Styles ── */
      .ascii-art {
        font-family: 'JetBrains Mono', monospace;
        font-size: 5.8px;
        fill: url(#asciiGrad);
        font-weight: 700;
      }
      .prompt {
        font-family: 'JetBrains Mono', monospace;
        font-size: 15px;
        fill: #00F2FE;
        font-weight: 700;
      }
      .cmd {
        font-family: 'JetBrains Mono', monospace;
        font-size: 15px;
        fill: #FFFFFF;
      }
      .bio {
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        fill: #94A3B8;
      }

      /* ── Staggered Animations ── */
      .a-prompt1  { opacity: 0; animation: typeIn 0.1s ease forwards 0.1s; }
      .a-prompt2  { opacity: 0; animation: typeIn 0.1s ease forwards 5.4s; }
      .a-portrait { opacity: 0; animation: typeIn 0.8s ease forwards 6.5s; }

      /* ── Cursor ── */
      .cursor {
        fill: #00FF87;
        animation: blink 1s step-end infinite;
      }
    </style>

    <!-- Gradients -->
    <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="50%" stop-color="#4FACFE" />
      <stop offset="100%" stop-color="#00FF87" />
    </linearGradient>

    <!-- Clip Paths for Typewriter Reveals -->
    <clipPath id="clip-cmd1">
      <rect x="211" y="15" width="0" height="25">
        <animate attributeName="width" from="0" to="120" dur="0.8s" begin="0.3s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="clip-bio1">
      <rect x="40" y="45" width="0" height="25">
        <animate attributeName="width" from="0" to="800" dur="1.0s" begin="1.3s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="clip-bio2">
      <rect x="40" y="67" width="0" height="25">
        <animate attributeName="width" from="0" to="800" dur="1.0s" begin="2.3s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="clip-bio3">
      <rect x="40" y="89" width="0" height="25">
        <animate attributeName="width" from="0" to="800" dur="1.0s" begin="3.3s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="clip-bio4">
      <rect x="40" y="111" width="0" height="25">
        <animate attributeName="width" from="0" to="800" dur="1.0s" begin="4.3s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="clip-cmd2">
      <rect x="211" y="150" width="0" height="25">
        <animate attributeName="width" from="0" to="170" dur="0.8s" begin="5.5s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

  <!-- ═══════ Command 1: cat intro.txt ═══════ -->
  <g class="a-prompt1">
    <text x="40" y="35">
      <tspan class="prompt">naman@portfolio:~$ </tspan>
      <tspan class="cmd" clip-path="url(#clip-cmd1)">cat intro.txt</tspan>
    </text>
    <rect x="211" y="22" width="8" height="17" class="cursor">
      <animate attributeName="x" from="211" to="331" dur="0.8s" begin="0.3s" fill="freeze" />
      <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.9;1" dur="0.9s" begin="0.3s" fill="freeze" />
    </rect>
  </g>

  <!-- Bio Output (character-by-character typing) -->
  <text x="40" y="65" class="bio" clip-path="url(#clip-bio1)">An Oracle Certified AI Engineer, Anthropic MCP Certified developer, and former 2× founder.</text>
  <text x="40" y="87" class="bio" clip-path="url(#clip-bio2)">Currently working as an AI Engineer at Scanbo, I specialize in building scalable AI systems</text>
  <text x="40" y="109" class="bio" clip-path="url(#clip-bio3)">using LangChain, LangGraph, and Agentic RAG. Driven by a founder's mindset, I bridge</text>
  <text x="40" y="131" class="bio" clip-path="url(#clip-bio4)">customer problems with production-ready AI agents and enterprise workflow automations.</text>

  <!-- ═══════ Command 2: view portrait.sh ═══════ -->
  <g class="a-prompt2">
    <text x="40" y="170">
      <tspan class="prompt">naman@portfolio:~$ </tspan>
      <tspan class="cmd" clip-path="url(#clip-cmd2)">./view portrait.sh</tspan>
    </text>
    <rect x="211" y="157" width="8" height="17" class="cursor">
      <animate attributeName="x" from="211" to="376" dur="0.8s" begin="5.5s" fill="freeze" />
      <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.9;1" dur="0.9s" begin="5.5s" fill="freeze" />
    </rect>
  </g>

