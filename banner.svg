             values="0;0;1;1;1;1;0;0" 
             keyTimes="0;0.679;0.68;0.76;0.91;0.99;0.991;1" 
             dur="12s" repeatCount="indefinite" />
    <animate attributeName="visibility"
             values="visible;hidden;visible"
             dur="0.8s" repeatCount="indefinite" />
  </rect>

  <!-- Currently Building Section -->
  <text x="530" y="235" class="heading-text">🚀 Currently Building</text>
  
  <text x="530" y="268" class="bullet-text">• Voice AI</text>
  <text x="530" y="298" class="bullet-text">• MCP</text>
  <text x="530" y="328" class="bullet-text">• Healthcare AI</text>

  <!-- Chat with me Section -->
  <text x="530" y="390" class="heading-text">💬 Chat With Me</text>

  <!-- Clickable-looking Chat Box Card -->
  <g transform="translate(530, 410)">
    <rect width="340" height="75" rx="8" class="card-border" />
    
    <!-- Chat Icon / Details -->
    <text x="20" y="30" class="chat-header">Hello! Ask me anything.</text>
    
    <!-- Assistant Action Button -->
    <text x="20" y="54" class="chat-btn-text">▶ Open Naman Bot</text>
  </g>
