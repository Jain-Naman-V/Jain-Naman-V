<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 520" width="100%" height="520">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');

      .window-bg {
        fill: url(#bgGrad);
        stroke: url(#borderGrad);
        stroke-width: 1.5;
      }
      .title-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        fill: #64748B;
      }
      .ascii-art {
        font-family: 'JetBrains Mono', monospace;
        font-size: 5.8px;
        fill: url(#asciiGrad);
        font-weight: 700;
      }
      .name-text {
        font-family: 'Inter', sans-serif;
        font-size: 30px;
        font-weight: 700;
        fill: #FFFFFF;
      }
      .prompt-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 16px;
        fill: #00F2FE;
        font-weight: 700;
      }
      .role-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 20px;
        fill: #00FF87;
        font-weight: 700;
      }
      .heading-text {
        font-family: 'Inter', sans-serif;
        font-size: 18px;
        font-weight: 600;
        fill: #E2E8F0;
      }
      .bullet-text {
        font-family: 'Inter', sans-serif;
        font-size: 15px;
        fill: #94A3B8;
      }
      .chat-header {
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        font-weight: 600;
        fill: #94A3B8;
      }
      .chat-btn-text {
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 700;
        fill: #00FF87;
      }
      .card-border {
        stroke: #334155;
        stroke-width: 1;
        fill: #1E293B;
      }
      .card-border:hover {
        stroke: #4FACFE;
        cursor: pointer;
      }
    </style>

    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.3" />
    </linearGradient>
    <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="50%" stop-color="#4FACFE" />
      <stop offset="100%" stop-color="#00FF87" />
    </linearGradient>

    <!-- Typewriter Reveal Clips -->
    <clipPath id="clip1">
      <rect x="705" y="140" height="40" width="0">
        <animate attributeName="width" 
                 values="0;0;145;145;0;0;0" 
                 keyTimes="0;0.02;0.10;0.25;0.33;0.331;1" 
                 dur="12s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <clipPath id="clip2">
      <rect x="705" y="140" height="40" width="0">
        <animate attributeName="width" 
                 values="0;0;0;250;250;0;0;0" 
                 keyTimes="0;0.349;0.35;0.43;0.58;0.66;0.661;1" 
                 dur="12s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <clipPath id="clip3">
      <rect x="705" y="140" height="40" width="0">
        <animate attributeName="width" 
                 values="0;0;0;190;190;0;0;0" 
                 keyTimes="0;0.679;0.68;0.76;0.91;0.99;0.991;1" 
                 dur="12s" repeatCount="indefinite" />
      </rect>
    </clipPath>
  </defs>

  <!-- Card Window Background -->
  <rect width="950" height="520" rx="12" class="window-bg" />

  <!-- macOS Style Title Bar -->
  <line x1="0" y1="40" x2="950" y2="40" stroke="#1E293B" stroke-width="1.5" />
  <circle cx="25" cy="20" r="6" fill="#FF5F56" />
  <circle cx="45" cy="20" r="6" fill="#FFBD2E" />
  <circle cx="65" cy="20" r="6" fill="#27C93F" />
  <text x="475" y="25" text-anchor="middle" class="title-text">naman@portfolio: ~</text>

